          python-version: 3.x
          architecture: ${{ matrix.platform.python_arch }}
      # Defender's real-time scan dominates the cargo build wall-clock; exclude the
      # file-heavy dirs (best-effort).
      - name: Exclude build dirs from Windows Defender
        shell: pwsh
        run: |
          foreach ($p in @(
            "${{ github.workspace }}",
            "$env:USERPROFILE\.cargo"
          )) { Add-MpPreference -ExclusionPath $p -ErrorAction SilentlyContinue }
      # windows-latest now ships VS2026, which breaks the cmake 0.1.54 crate used by
      # the aws-lc-sys build script. Force the Ninja generator on the x64/x86 legs
      # (the windows-11-arm runner is unaffected).
      - name: Force Ninja CMake generator (x64/x86)
        if: matrix.platform.target != 'aarch64'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_GENERATOR=Ninja"
